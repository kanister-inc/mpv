name: Deploy React App to Pages

on:
  push:
    branches: ["main"] # Скрипт срабатывает при пуше в ветку main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mpv-front  # <-- ЗАСТАВЛЯЕМ ГИТХАБ РАБОТАТЬ ВНУТРИ ПАПКИ ФРОНТЕНДА
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './mpv-front/package-lock.json'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './mpv-front/dist'  # <-- УКАЗЫВАЕМ ПУТЬ К СОБРАННОЙ ПАПКЕ ВНУТРИ ПОДПАПКИ
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
